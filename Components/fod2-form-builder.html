<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOD 2 — Form Builder · e-Governance Agency</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<style>
:root {
  --bg: #F7F5F0;
  --paper: #FCFBF7;
  --surface: #FFFFFF;
  --ink: #14110D;
  --muted: #6E6A5F;
  --muted-2: #A39E90;
  --border: rgba(20, 17, 13, 0.08);
  --border-2: rgba(20, 17, 13, 0.14);
  --border-3: rgba(20, 17, 13, 0.22);
  --accent: #C2410C;
  --accent-soft: #FDF0E6;
  --accent-ink: #7C2D12;
  --preview: #0F766E;
  --preview-soft: #E6F2F0;
  --schema: #1E293B;
  --danger: #B91C1C;
  --danger-soft: #FEF0F0;
  --success: #166534;
  --warn: #92400E;
  --warn-soft: #FDF4E3;

  --logic: #6D28D9;
  --logic-soft: #F3EEFD;
  --logic-ink: #4C1D95;
  --branch: #B45309;
  --branch-soft: #FEF3DE;
  --branch-ink: #78350F;
  --dep: #0369A1;
  --dep-soft: #E3F2F8;
  --dep-ink: #075985;

  --sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
  --serif: 'Fraunces', ui-serif, Georgia, serif;
  --mono: 'Geist Mono', ui-monospace, monospace;

  --r-sm: 5px;
  --r-md: 8px;
  --r-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
}
button, input, textarea, select { font-family: inherit; color: inherit; }

/* ═════ SHELL ═════ */
.app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

.topbar {
  display: grid;
  grid-template-columns: 320px 1fr 320px;
  align-items: center;
  background: var(--paper);
  border-bottom: 0.5px solid var(--border);
  padding: 0 16px;
  gap: 12px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

.brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--serif);
  font-weight: 500;
  font-size: 17px;
  letter-spacing: -0.02em;
}
.brand-mark {
  width: 22px; height: 22px;
  background: var(--ink);
  display: grid; place-items: center;
  border-radius: 5px;
  font-family: var(--sans);
  color: var(--paper);
  font-weight: 600;
  font-size: 10px;
}
.brand-v {
  font-family: var(--mono);
  font-size: 10px; color: var(--muted);
  margin-top: 4px;
}

.crumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
  border-left: 0.5px solid var(--border-2);
  padding-left: 12px; min-width: 0;
}
.crumb-active {
  color: var(--ink); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.mode-switch {
  display: flex; justify-self: center;
  background: var(--bg);
  border: 0.5px solid var(--border-2);
  border-radius: 7px;
  padding: 2px;
}
.mode-btn {
  background: transparent; border: none;
  font-size: 12px; font-weight: 500;
  padding: 5px 14px; border-radius: 5px;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
  transition: color 0.12s;
}
.mode-btn:hover { color: var(--ink); }
.mode-btn.active.build { background: var(--ink); color: var(--paper); }
.mode-btn.active.preview { background: var(--preview); color: white; }
.mode-btn.active.schema { background: var(--schema); color: white; }

.topbar-right {
  display: flex; align-items: center; gap: 6px; justify-self: end;
}
.save-status {
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  margin-right: 4px;
}
.save-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--success);
}

.btn {
  background: var(--surface);
  border: 0.5px solid var(--border-2);
  padding: 5px 12px;
  font-size: 12px; font-weight: 500;
  border-radius: var(--r-sm);
  cursor: pointer; color: var(--ink);
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
  transition: all 0.12s;
}
.btn:hover { border-color: var(--border-3); }
.btn.primary {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}
.btn.primary:hover { background: #000; }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--bg); }

.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #C2410C, #7C2D12);
  color: white; font-size: 10px; font-weight: 600;
  display: grid; place-items: center;
  margin-left: 4px;
}

.main {
  display: grid;
  grid-template-columns: 264px 1fr 336px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
.main.mode-preview { grid-template-columns: 1fr; background: var(--preview-soft); }
.main.mode-schema { grid-template-columns: 1fr; background: var(--schema); }

/* ═════ LEFT: LIBRARY ═════ */
.panel-left {
  background: var(--paper);
  border-right: 0.5px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0;
  background: var(--paper); z-index: 1;
}
.panel-title {
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--muted);
}
.lib-tabs {
  display: flex;
  margin-top: 10px; gap: 2px;
  background: var(--bg);
  border-radius: 6px; padding: 2px;
}
.lib-tab {
  flex: 1; background: transparent; border: none;
  padding: 5px 8px;
  font-size: 11px; font-weight: 500;
  border-radius: 4px; cursor: pointer;
  color: var(--muted); transition: all 0.12s;
}
.lib-tab.active {
  background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.lib-search { margin-top: 10px; position: relative; }
.lib-search input {
  width: 100%;
  padding: 6px 10px 6px 28px;
  font-size: 12px;
  background: var(--bg);
  border: 0.5px solid var(--border-2);
  border-radius: 6px;
  outline: none;
}
.lib-search svg {
  position: absolute; left: 8px; top: 50%;
  transform: translateY(-50%);
  opacity: 0.4; pointer-events: none;
}

.lib-content { padding: 10px 8px 20px; flex: 1; }
.lib-section { margin-bottom: 12px; }
.lib-section-label {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted-2);
  padding: 6px 8px 4px;
}

.lib-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: grab;
  transition: background 0.1s;
  user-select: none;
}
.lib-item:hover { background: var(--bg); }
.lib-item:active { cursor: grabbing; }

.lib-item-icon {
  width: 26px; height: 26px;
  border-radius: 5px;
  background: var(--bg);
  display: grid; place-items: center;
  flex-shrink: 0;
  border: 0.5px solid var(--border-2);
}
.lib-item-icon svg { width: 13px; height: 13px; stroke-width: 1.75; color: var(--ink); }
.lib-item-body { flex: 1; min-width: 0; }
.lib-item-name { font-size: 12px; font-weight: 500; }
.lib-item-desc {
  font-size: 10px; color: var(--muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-item.pattern .lib-item-icon {
  background: var(--accent-soft);
  border-color: rgba(194, 65, 12, 0.18);
}
.lib-item.pattern .lib-item-icon svg { color: var(--accent); }
.lib-item.branch-item .lib-item-icon {
  background: var(--branch-soft);
  border-color: rgba(180, 83, 9, 0.25);
}
.lib-item.branch-item .lib-item-icon svg { color: var(--branch); }

.badge-int {
  font-size: 9px; font-weight: 500;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 1px 5px; border-radius: 3px;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}

/* ═════ CENTER: CANVAS ═════ */
.panel-center {
  background: var(--bg);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}

.canvas-toolbar {
  background: var(--paper);
  border-bottom: 0.5px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 16px;
}

.form-title-wrap {
  display: flex; align-items: baseline; gap: 8px;
  flex: 1; min-width: 0;
}
.form-title {
  font-family: var(--serif);
  font-size: 18px; font-weight: 500;
  letter-spacing: -0.02em;
  background: transparent; border: none; outline: none;
  width: 100%; min-width: 0;
}
.form-slug {
  font-family: var(--mono);
  font-size: 10px; color: var(--muted);
  flex-shrink: 0;
}

/* Logic overview indicator */
.logic-overview-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 0.5px solid var(--border-2);
  padding: 4px 10px;
  border-radius: 99px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.12s;
}
.logic-overview-btn:hover { border-color: var(--border-3); }
.logic-overview-btn .chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
}
.logic-overview-btn .chip.rules { background: var(--logic-soft); color: var(--logic); }
.logic-overview-btn .chip.branches { background: var(--branch-soft); color: var(--branch); }
.logic-overview-btn .chip.sources { background: var(--dep-soft); color: var(--dep); }
.logic-overview-btn .chip svg { width: 9px; height: 9px; }

/* Logic overview sheet */
.logic-sheet {
  position: absolute;
  top: 50px; right: 20px;
  width: 400px;
  background: var(--paper);
  border: 0.5px solid var(--border-2);
  border-radius: var(--r-lg);
  box-shadow: 0 20px 50px rgba(20, 17, 13, 0.15);
  z-index: 100;
  overflow: hidden;
  animation: fadeDown 0.2s ease-out;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.logic-sheet-head {
  padding: 14px 16px 10px;
  border-bottom: 0.5px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.logic-sheet-title {
  font-family: var(--serif);
  font-size: 15px; font-weight: 500;
  letter-spacing: -0.015em;
}
.logic-sheet-close {
  background: transparent; border: none;
  cursor: pointer; color: var(--muted);
  padding: 4px; border-radius: 4px;
}
.logic-sheet-close:hover { background: var(--bg); color: var(--ink); }
.logic-sheet-body {
  max-height: 480px;
  overflow-y: auto;
  padding: 8px 16px 16px;
}
.logic-sheet-group-title {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted);
  padding: 12px 0 6px;
  display: flex; justify-content: space-between;
}
.logic-sheet-item {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.12s;
}
.logic-sheet-item:hover { border-color: var(--border-3); }
.logic-sheet-item-head {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted);
  margin-bottom: 4px;
}
.logic-sheet-item-rule {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
}
.rule-kw { font-weight: 500; letter-spacing: 0.02em; }
.rule-kw.logic { color: var(--logic); }
.rule-kw.branch { color: var(--branch); }
.rule-kw.dep { color: var(--dep); }
.rule-ref {
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
  border: 0.5px solid var(--border-2);
  font-weight: 500;
}
.rule-val { color: var(--success); }

.toolbar-stat {
  font-size: 11px; color: var(--muted);
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}

/* Steps rail */
.steps-rail {
  background: var(--paper);
  border-bottom: 0.5px solid var(--border);
  padding: 8px 20px;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto;
}
.step-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 6px;
  background: var(--bg);
  border: 0.5px solid var(--border-2);
  border-radius: 99px;
  font-size: 11px; color: var(--muted);
  cursor: pointer; flex-shrink: 0;
  transition: all 0.12s;
}
.step-pill:hover { border-color: var(--border-3); color: var(--ink); }
.step-pill.active {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.step-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--surface);
  display: grid; place-items: center;
  font-size: 10px; font-weight: 500;
  font-family: var(--mono);
  color: var(--ink);
  border: 0.5px solid var(--border-2);
}
.step-pill.active .step-num {
  background: rgba(255,255,255,0.15);
  color: var(--paper);
  border-color: transparent;
}
.step-lock { font-size: 10px; opacity: 0.6; }

.step-add {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 50%;
  border: 0.5px dashed var(--border-3);
  background: transparent; color: var(--muted);
  cursor: pointer; flex-shrink: 0;
  margin-left: 4px;
}
.step-add:hover { border-color: var(--ink); color: var(--ink); }

.canvas-scroll {
  flex: 1; overflow-y: auto;
  padding: 32px 20px 120px;
}
.canvas-doc { max-width: 680px; margin: 0 auto; }

.step-header { margin-bottom: 20px; }
.step-header-tag {
  font-family: var(--mono);
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.step-header-title {
  font-family: var(--serif);
  font-size: 28px; font-weight: 500;
  letter-spacing: -0.025em; line-height: 1.1;
  margin-top: 4px;
  background: transparent; border: none; outline: none;
  width: 100%;
}
.step-header-desc {
  font-size: 13px; color: var(--muted);
  margin-top: 6px;
  background: transparent; border: none; outline: none;
  width: 100%; resize: none;
  font-family: inherit;
}
.step-locked-ribbon {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 500;
  background: var(--warn-soft); color: var(--warn);
  padding: 3px 8px; border-radius: 4px;
  margin-top: 8px;
}

/* Field block */
.field-block {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 8px;
  position: relative;
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.field-block:hover { border-color: var(--border-2); }
.field-block.selected {
  border-color: var(--ink);
  box-shadow: 0 0 0 2px var(--ink);
}
.field-block.locked {
  background: var(--bg);
  border-style: dashed;
  opacity: 0.85;
  cursor: not-allowed;
}
.field-block.pattern {
  background: linear-gradient(180deg, var(--accent-soft) 0%, var(--surface) 80%);
  border-color: rgba(194, 65, 12, 0.22);
}

/* HIGHLIGHTED — dependencies visualization */
.field-block.highlight-trigger {
  border-color: var(--logic);
  box-shadow: 0 0 0 2px var(--logic-soft);
}
.field-block.highlight-trigger::before {
  content: 'Triggers →';
  position: absolute;
  top: -8px;
  left: 12px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--logic);
  background: var(--paper);
  padding: 0 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.field-block.highlight-dependent {
  border-color: var(--logic);
}

.fb-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.fb-drag {
  width: 10px;
  display: flex; flex-direction: column; gap: 2px;
  opacity: 0.25; cursor: grab;
}
.fb-drag span {
  width: 2px; height: 2px;
  background: var(--ink);
  border-radius: 50%;
  display: block;
}
.fb-type {
  font-family: var(--mono);
  font-size: 10px; color: var(--muted);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: lowercase;
}
.field-block.pattern .fb-type {
  background: var(--accent); color: white;
}
.fb-id-pill {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted-2);
  padding: 1px 5px;
  background: transparent;
  border: 0.5px dashed var(--border-3);
  border-radius: 3px;
}

.fb-logic-flags {
  display: flex; gap: 4px;
  margin-left: auto;
}
.fb-flag {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  padding: 2px 6px;
  border-radius: 3px;
  cursor: default;
}
.fb-flag.rule { background: var(--logic-soft); color: var(--logic); }
.fb-flag.branch { background: var(--branch-soft); color: var(--branch); }
.fb-flag.dep { background: var(--dep-soft); color: var(--dep); }
.fb-flag.int { background: var(--accent-soft); color: var(--accent-ink); }

.fb-label {
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}
.fb-help {
  font-size: 11px; color: var(--muted);
  margin-bottom: 8px;
}
.fb-preview {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--muted);
}
.fb-preview-input { color: var(--ink); background: var(--surface); }
.fb-preview-options { display: flex; flex-direction: column; gap: 6px; }
.fb-preview-options > div {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink);
}

/* Field ribbons */
.fb-ribbon {
  margin-top: 8px;
  padding: 7px 10px;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  display: flex; align-items: flex-start; gap: 8px;
  position: relative;
  cursor: pointer;
  transition: background 0.12s;
}
.fb-ribbon.logic { background: var(--logic-soft); color: var(--logic-ink); }
.fb-ribbon.branch { background: var(--branch-soft); color: var(--branch-ink); }
.fb-ribbon.dep { background: var(--dep-soft); color: var(--dep-ink); }
.fb-ribbon:hover { filter: brightness(0.98); }
.fb-ribbon-icon {
  width: 16px; height: 16px;
  border-radius: 50%;
  color: white; font-size: 9px; font-weight: 600;
  font-family: var(--sans);
  display: grid; place-items: center;
  flex-shrink: 0; margin-top: 1px;
}
.fb-ribbon.logic .fb-ribbon-icon { background: var(--logic); }
.fb-ribbon.branch .fb-ribbon-icon { background: var(--branch); }
.fb-ribbon.dep .fb-ribbon-icon { background: var(--dep); }

.fb-ribbon-body { flex: 1; }
.fb-ribbon-edit {
  font-size: 10px;
  opacity: 0.55;
  padding: 0 4px;
  align-self: center;
}
.fb-ribbon:hover .fb-ribbon-edit { opacity: 1; }

.fb-ribbon-ref {
  background: white;
  padding: 1px 5px;
  border-radius: 3px;
  border: 0.5px solid currentColor;
  font-weight: 500;
}
.fb-ribbon-val {
  background: white;
  padding: 1px 5px;
  border-radius: 3px;
  border: 0.5px solid currentColor;
}

/* "Add logic" footer */
.fb-footer {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 0.5px dashed var(--border-2);
  display: flex; gap: 4px;
  flex-wrap: wrap;
  opacity: 0;
  transition: opacity 0.15s;
}
.field-block:hover .fb-footer,
.field-block.selected .fb-footer { opacity: 1; }

.fb-add-btn {
  background: transparent;
  border: 0.5px dashed var(--border-3);
  padding: 3px 8px;

/* ═════════ HELPERS ═════════ */
function getAllFields(form) {
  const out = [];
  form.steps.forEach(s => {
    s.fields.forEach(f => {
      out.push({ ...f, _step: s.title, _stepId: s.id });
      if (f.branches) {
        Object.entries(f.branches).forEach(([triggerValue, branch]) => {
          branch.fields.forEach(bf => {
            out.push({ ...bf, _step: s.title, _stepId: s.id, _branch: triggerValue, _branchId: branch.id });
          });
        });
      }
    });
  });
  return out;
}

function countLogic(form) {
  let rules = 0, branches = 0, sources = 0;
  getAllFields(form).forEach(f => {
    if (f.rules) rules += f.rules.length;
    if (f.branches) branches += 1;
    if (f.source) sources += 1;
  });
  return { rules, branches, sources };
}

function findField(form, id) {
  return getAllFields(form).find(f => f.id === id);
}

/* Logic Overview Sheet */
function LogicSheet({ form, counts, onClose, onNavigate }) {
  const rules = [];
  const branches = [];
  const sources = [];

  form.steps.forEach((s, si) => {
    s.fields.forEach(f => {
      if (f.rules) f.rules.forEach(r => rules.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, rule: r }));
      if (f.branches) branches.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, variants: Object.keys(f.branches) });
      if (f.source) sources.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, source: f.source });
    });
  });

  return h('div', { className: 'logic-sheet' },
    h('div', { className: 'logic-sheet-head' },
      h('div', { className: 'logic-sheet-title' }, 'Logic overview'),
      h('button', { className: 'logic-sheet-close', onClick: onClose },
        h(Icon, { name: 'close', size: 14 })
      )
    ),
    h('div', { className: 'logic-sheet-body' },
      rules.length > 0 && h('div', null,
        h('div', { className: 'logic-sheet-group-title' },
          h('span', null, 'Field rules'),
          h('span', { style: { color: 'var(--logic)', fontFamily: 'var(--mono)' } }, counts.rules)
        ),
        rules.map((r, i) =>
          h('div', { key: i, className: 'logic-sheet-item', onClick: () => onNavigate(r.stepIdx, r.fieldId) },
            h('div', { className: 'logic-sheet-item-head' },
              h('span', null, r.step),
              h('span', { style: { fontFamily: 'var(--mono)', color: 'var(--logic)' } }, r.fieldId)
            ),
            h('div', { className: 'logic-sheet-item-rule' },
              h('span', { className: 'rule-kw logic' }, r.rule.action),
              ' "', r.fieldLabel, '" when ',
              h('span', { className: 'rule-ref' }, r.rule.when.field),
              ' ', h('span', { className: 'rule-kw' }, r.rule.when.op), ' ',
              h('span', { className: 'rule-val' }, `"${r.rule.when.value}"`)
            )
          )
        )
      ),
      branches.length > 0 && h('div', null,
        h('div', { className: 'logic-sheet-group-title' },
          h('span', null, 'Branches'),
          h('span', { style: { color: 'var(--branch)', fontFamily: 'var(--mono)' } }, counts.branches)
        ),
        branches.map((b, i) =>
          h('div', { key: i, className: 'logic-sheet-item', onClick: () => onNavigate(b.stepIdx, b.fieldId) },
            h('div', { className: 'logic-sheet-item-head' },
              h('span', null, b.step),
              h('span', { style: { fontFamily: 'var(--mono)', color: 'var(--branch)' } }, b.fieldId)
            ),
            h('div', { className: 'logic-sheet-item-rule' },
              h('span', { className: 'rule-kw branch' }, 'SWITCH'),
              ' "', b.fieldLabel, '" · ',
              b.variants.length, ' variants: ',
              b.variants.map(v => `"${v}"`).join(' / ')
            )
          )
        )
      ),
      sources.length > 0 && h('div', null,
        h('div', { className: 'logic-sheet-group-title' },
          h('span', null, 'Dependent sources'),
          h('span', { style: { color: 'var(--dep)', fontFamily: 'var(--mono)' } }, counts.sources)
        ),
        sources.map((s, i) =>
          h('div', { key: i, className: 'logic-sheet-item', onClick: () => onNavigate(s.stepIdx, s.fieldId) },
            h('div', { className: 'logic-sheet-item-head' },
              h('span', null, s.step),
              h('span', { style: { fontFamily: 'var(--mono)', color: 'var(--dep)' } }, s.fieldId)
            ),
            h('div', { className: 'logic-sheet-item-rule' },
              h('span', { className: 'rule-kw dep' }, 'SOURCE'),
              ' ', h('span', { className: 'rule-ref' }, s.source.type),
              s.source.filter && [' · ', h('span', { className: 'rule-val', key: 'f' }, s.source.filter)]
            )
          )
        )
      )
    )
  );
}

/* Field Block */
function FieldBlock({ field, selected, onSelect, locked, form, highlightedDep, setHighlightedDep }) {
  if (field.type === 'divider') {
    return h('div', { className: 'fb-divider', onClick: onSelect }, field.label);
  }

  const hasRule = field.rules && field.rules.length > 0;
  const hasSource = !!field.source;
  const hasIntegration = field.integrations && field.integrations.length > 0;

  // Check if this field is a trigger for any visible rule (for highlighting)
  const isTrigger = highlightedDep === field.id;
  // Check if this field has a rule that references the highlighted field
  const isDependent = field.rules && field.rules.some(r => r.when.field === highlightedDep);

  return h('div', {
    className: `field-block ${selected ? 'selected' : ''} ${locked ? 'locked' : ''} ${field.pattern ? 'pattern' : ''} ${isTrigger ? 'highlight-trigger' : ''} ${isDependent ? 'highlight-dependent' : ''}`,
    onClick: onSelect
  },
    h('div', { className: 'fb-header' },
      h('div', { className: 'fb-drag' },
        h('span'), h('span'), h('span'), h('span'), h('span'), h('span')
      ),
      h('span', { className: 'fb-type' }, field.type),
      h('span', { className: 'fb-id-pill' }, field.id),
      h('div', { className: 'fb-logic-flags' },
        hasRule && h('span', { className: 'fb-flag rule' },
          h('span', { style: { width: 5, height: 5, borderRadius: 99, background: 'currentColor' } }),
          field.rules.length, ' rule', field.rules.length > 1 ? 's' : ''
        ),
        hasSource && h('span', { className: 'fb-flag dep' },
          h('span', { style: { width: 5, height: 5, borderRadius: 99, background: 'currentColor' } }),
          'source'
        ),
        hasIntegration && h('span', { className: 'fb-flag int' },
          field.integrations.join(' · ')
        ),
      )
    ),
    h('div', { className: 'fb-label' }, field.label, field.required && h('span', { style: { color: 'var(--danger)' } }, ' *')),
    field.help && h('div', { className: 'fb-help' }, field.help),
    h(FieldPreview, { field }),

    hasRule && field.rules.map(rule => {
      const triggerField = findField(form, rule.when.field);
      return h('div', {
        key: rule.id,
        className: 'fb-ribbon logic',
        onMouseEnter: () => setHighlightedDep(rule.when.field),
        onMouseLeave: () => setHighlightedDep(null),
      },
        h('div', { className: 'fb-ribbon-icon' }, 'if'),
        h('div', { className: 'fb-ribbon-body' },
          h('span', { className: 'rule-kw' }, rule.action), ' when ',
          h('span', { className: 'fb-ribbon-ref' }, rule.when.field),
          ' ', rule.when.op, ' ',
          h('span', { className: 'fb-ribbon-val' }, `"${rule.when.value}"`),
          triggerField && h('div', {
            style: { fontSize: 10, marginTop: 2, opacity: 0.7, fontFamily: 'var(--sans)' }
          }, '↑ ', triggerField.label)
        ),
        h('span', { className: 'fb-ribbon-edit' }, 'edit')
      );
    }),

    hasSource && h('div', { className: 'fb-ribbon dep' },
      h('div', { className: 'fb-ribbon-icon' }, 'src'),
      h('div', { className: 'fb-ribbon-body' },
        h('span', { className: 'rule-kw' }, 'FROM'), ' ',
        h('span', { className: 'fb-ribbon-ref' }, field.source.type),
        field.source.filter && [' · ', h('span', { className: 'fb-ribbon-val', key: 'f' }, field.source.filter)]
      ),
      h('span', { className: 'fb-ribbon-edit' }, 'edit')
    ),

    !locked && h('div', { className: 'fb-footer' },
      !hasRule && h('button', { className: 'fb-add-btn rule', onClick: e => e.stopPropagation() },
        h('span', { className: 'dot' }), '+ Add rule'
      ),
      !hasSource && (field.type === 'select' || field.type === 'radio') && h('button', { className: 'fb-add-btn dep', onClick: e => e.stopPropagation() },
        h('span', { className: 'dot' }), '+ Dynamic source'
      )
    )
  );
}

/* Branch block */
function BranchBlock({ field, selected, onSelect, activeBranch, setActiveBranch, selectedField, setSelectedField, highlightedDep, setHighlightedDep, form }) {
  const variants = Object.keys(field.branches);
  const activeVariant = activeBranch[field.id] || variants[0];
  const variantBranch = field.branches[activeVariant];

  return h('div', {
    className: `branch-container ${selected ? 'selected' : ''}`,
    onClick: onSelect
  },
    h('div', { className: 'branch-header' },
      h('span', { className: 'branch-badge' }, 'Branch'),
      h('span', { className: 'branch-title' }, field.label),
      h('span', { className: 'branch-trigger' },
        'trigger: ', h('span', { className: 'ref' }, field.id)
      )
    ),
    h(FieldPreviewCompact, { field }),

    h('div', { className: 'variant-tabs', style: { marginTop: 10 }, onClick: e => e.stopPropagation() },
      variants.map(v =>
        h('button', {
          key: v,
          className: `variant-tab ${activeVariant === v ? 'active' : ''}`,
          onClick: e => { e.stopPropagation(); setActiveBranch({ ...activeBranch, [field.id]: v }); }
        },
          h('span', { style: { width: 5, height: 5, borderRadius: 99, background: activeVariant === v ? 'var(--branch)' : 'var(--muted-2)' } }),
          v
        )
      ),

    ),
    h('div', { className: 'variant-when' },

      h('span', { className: 'ref', style: { background: 'white', padding: '0 4px', borderRadius: 2, border: '0.5px solid currentColor' } }, field.id),
      ' = "',
      activeVariant,
      '"'
    ),
    h('div', { className: 'variant-fields' },
      variantBranch.fields.map(bf =>
        h('div', {
          key: bf.id,
          className: 'mini-field',
          style: {
            cursor: 'pointer',
            ...(selectedField === bf.id ? { background: 'var(--ink)', color: 'var(--paper)' } : {})
          },
          onClick: e => { e.stopPropagation(); setSelectedField(bf.id); }
        },
          h('span', { className: 'mini-type', style: selectedField === bf.id ? { background: 'rgba(255,255,255,0.2)', color: 'white' } : {} }, bf.type),
          bf.label, bf.required && h('span', { style: { color: 'var(--danger)' } }, ' *'),

}

/* ═════════ RIGHT PANEL ═════════ */
function RightPanel({ field, form, setForm, prTab, setPrTab, setHighlightedDep }) {
  if (!field) {

  }

  const hasRules = field.rules && field.rules.length > 0;
  const hasSource = !!field.source;
  const hasBranches = !!field.branches;
  const logicCount = (field.rules?.length || 0) + (hasSource ? 1 : 0) + (hasBranches ? 1 : 0);
  const hasIntegrations = field.integrations && field.integrations.length > 0;

  return h('div', { className: 'panel-right' },
    h('div', { className: 'pr-head' },
      h('div', { className: 'pr-breadcrumb' },
        field._branch ? `Branch: ${field._branch}` : (field._step || 'Field'), ' · ', field.type

      h('div', { className: 'pr-subtitle' },
        h('span', { style: { fontFamily: 'var(--mono)' } }, field.id)

        h('button', {
          className: `pr-tab basic ${prTab === 'basic' ? 'active' : ''}`,
          onClick: () => setPrTab('basic')

        h('button', {
          className: `pr-tab logic-tab ${prTab === 'logic' ? 'active' : ''}`,
          onClick: () => setPrTab('logic')
        }, 'Logic',
          logicCount > 0 && h('span', { className: 'pr-tab-count' }, logicCount)
        ),
        h('button', {
          className: `pr-tab integrations ${prTab === 'integrations' ? 'active' : ''}`,

/* ═════════ PREVIEW STAGE ═════════ */
function PreviewStage({ form }) {
  const [step, setStep] = useState(0);
  const [values, setValues] = useState({});
  const currentStep = form.steps[step];
  const progress = ((step + 1) / form.steps.length) * 100;

  const evalRule = (rule) => {
    if (!rule) return true;
    const val = values[rule.when.field];
    switch (rule.when.op) {
      case 'equals': return val === rule.when.value;
      case 'not_equals': return val !== rule.when.value;
      default: return true;
    }
  };

  const visibleFields = currentStep.fields.filter(f => {
    if (!f.rules) return true;
    return f.rules.every(r => {
      if (r.action === 'SHOW') return evalRule(r);
      if (r.action === 'HIDE') return !evalRule(r);
      return true;
    });
  });

  return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
    h('div', { className: 'preview-toolbar' },
      h('span', { className: 'preview-tb-label' }, 'Live preview · Try the logic')
    ),
    h('div', { className: 'preview-stage' },
      h('div', { className: 'preview-doc' },
        h('div', { className: 'preview-head' },
          h('div', { className: 'preview-gov' },
            h('span', {
              style: {
                display: 'inline-block',
                width: 14, height: 10,
                background: 'linear-gradient(to bottom, #0052CC 33%, #FFD100 33% 66%, #CE1126 66%)',
                borderRadius: 2,
              }
            }),
            'EVO · Serviciul național'
          ),
          h('div', { className: 'preview-title' }, form.title),
          h('div', { className: 'preview-progress' },
            h('div', { className: 'preview-progress-bar' },
              h('div', { className: 'preview-progress-fill', style: { width: `${progress}%` } })
            ),
            h('div', { className: 'preview-progress-label' },
              h('span', null, `Pasul ${step + 1} din ${form.steps.length}`),
              h('span', null, `${Math.round(progress)}%`)
            )
          )
        ),
        h('div', { className: 'preview-body' },
          h('div', { className: 'preview-step-title' }, currentStep.title),
          h('div', { className: 'preview-step-desc' }, currentStep.description),
          visibleFields.map(f => h(PreviewField, {
            key: f.id, field: f, values, setValues,
            conditional: !!f.rules
          })),
          h('div', { className: 'preview-nav' },
            h('button', { className: 'preview-btn outline', onClick: () => setStep(Math.max(0, step - 1)), disabled: step === 0 },
              h(Icon, { name: 'chevronL', size: 12 }), 'Înapoi'
            ),
            h('button', { className: 'preview-btn', onClick: () => setStep(Math.min(form.steps.length - 1, step + 1)) },
              step === form.steps.length - 1 ? 'Trimite' : 'Înainte',
              h(Icon, { name: 'chevron', size: 12 })
            )
          )
        )
      )
    )
  );
}

function PreviewField({ field, values, setValues, conditional }) {
  if (field.type === 'divider') {
    return h('div', { style: { fontFamily: 'var(--serif)', fontSize: 14, fontStyle: 'italic', color: 'var(--muted)', margin: '18px 0 8px' } }, field.label);
  }

  const setValue = v => setValues({ ...values, [field.id]: v });

  // Branch rendering
  if (field.branches) {
    const v = values[field.id];
    const branch = v && field.branches[v];
    return h('div', null,
      h('div', { className: 'preview-field' },
        h('label', { className: 'preview-label' }, field.label, field.required && h('span', { className: 'req' }, ' *')),
        h('div', null,
          field.options.map(opt =>
            h('div', {
              key: opt,
              className: `preview-option ${values[field.id] === opt ? 'selected' : ''}`,
              onClick: () => setValue(opt)
            },
              h('div', { className: 'preview-radio' }),
              opt
            )
          )
        )
      ),
      branch && h('div', { className: 'cond-branch-preview' },
        h('div', { style: { fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--branch)', marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' } },
          '· Branch · ', values[field.id]
        ),
        branch.fields.map(bf => h(PreviewField, { key: bf.id, field: bf, values, setValues }))
      )
    );
  }

  const content = h('div', { className: conditional ? 'cond-field-preview' : '' },
    h('div', { className: 'preview-field', style: conditional ? { marginBottom: 0 } : {} },
      h('label', { className: 'preview-label' },
        field.label, field.required && h('span', { className: 'req' }, ' *')
      ),
      (() => {
        switch (field.type) {
          case 'text':
          case 'number':
            return h('input', {
              className: 'preview-input',
              type: field.type === 'number' ? 'number' : 'text',
              value: values[field.id] || '',
              onChange: e => setValue(e.target.value)
            });
          case 'textarea':
            return h('textarea', { className: 'preview-textarea', rows: 3 });
          case 'date':
            return h('input', { className: 'preview-input', type: 'date' });
          case 'select':
            return h('select', {
              className: 'preview-select',
              value: values[field.id] || '',
              onChange: e => setValue(e.target.value)
            },
              h('option', { value: '' }, 'Selectează…'),
              (field.options || []).map(o => h('option', { key: o, value: o }, o))
            );
          case 'radio':
            return h('div', null,
              (field.options || []).map(o =>
                h('div', {
                  key: o,
                  className: `preview-option ${values[field.id] === o ? 'selected' : ''}`,
                  onClick: () => setValue(o)
                },
                  h('div', { className: 'preview-radio' }),
                  o
                )
              )
            );
          case 'upload':
            return h('div', {
              style: { padding: '18px', border: '0.5px dashed var(--border-3)', borderRadius: 8, textAlign: 'center', color: 'var(--muted)', fontSize: 12 }
            }, 'Drop file here or click to browse');
          default:
            return h('input', { className: 'preview-input', placeholder: field.type });
        }
      })(),
      field.help && h('div', { style: { fontSize: 10, color: 'var(--muted)', marginTop: 3 } }, field.help)
    )
  );

  return content;
}

/* ═════════ SCHEMA ═════════ */
function SchemaStage({ form }) {
  const json = useMemo(() => JSON.stringify(form, null, 2), [form]);
  const highlighted = useMemo(() => highlightJSON(json), [json]);
  const lines = json.split('\n');

  return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
    h('div', { className: 'schema-toolbar' },
      h('span', { className: 'schema-file' }, `forms/${form.slug}.json`)
    ),
    h('div', { className: 'schema-stage' },
      h('div', { className: 'schema-body' },
        h('div', { className: 'schema-gutter' },
          lines.map((_, i) => h('div', { key: i }, i + 1))
        ),
        h('div', { className: 'schema-code', dangerouslySetInnerHTML: { __html: highlighted } })
      )
    )
  );
}

function highlightJSON(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, (match) => {
      let cls = 'tok-num';
      if (/^"/.test(match)) cls = /:$/.test(match) ? 'tok-key' : 'tok-str';
      else if (/true|false/.test(match)) cls = 'tok-bool';
      return `<span class="${cls}">${match}</span>`;
    })
    .replace(/([{}\[\],])/g, '<span class="tok-brace">$1</span>');
}

createRoot(document.getElementById('root')).render(h(App));
