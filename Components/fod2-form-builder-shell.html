<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOD 2 — Form Builder Shell · eGA</title>

<link rel="stylesheet" href="css/main.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-family-primary-font, Onest), ui-sans-serif, system-ui, sans-serif;
  background: var(--color-background-base-secondary);
  color: var(--color-text-base-default);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

/* ── Shell ── */
.fob { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

/* ── Top bar ── */
.fob-topbar {
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  align-items: center;
  background: var(--color-background-base-default);
  border-bottom: var(--border-width-1) solid var(--color-border-base-default);
  padding: 0 var(--spacing-16);
  gap: var(--spacing-12);
}
.fob-topbar-left { display: flex; align-items: center; gap: var(--spacing-12); min-width: 0; }
.fob-brand {
  display: flex; align-items: center; gap: var(--spacing-8);
  font-size: var(--font-size-fs-16, 16px);
  font-weight: var(--font-weight-fw-semibold, 600);
  letter-spacing: -0.02em;
  color: var(--color-text-base-default);
  white-space: nowrap;
}
.fob-brand-mark {
  width: 24px; height: 24px;
  background: var(--color-background-brand-default, #0A69D9);
  display: grid; place-items: center;
  border-radius: var(--border-radius-4, 4px);
  color: #fff;
  font-size: 9px;
  font-weight: var(--font-weight-fw-bold, 700);
  flex-shrink: 0;
}
.fob-crumb {
  display: flex; align-items: center; gap: var(--spacing-6);
  font-size: var(--font-size-fs-12, 12px);
  color: var(--color-text-base-secondary);
  border-left: var(--border-width-1) solid var(--color-border-base-default);
  padding-left: var(--spacing-12); min-width: 0;
}
.fob-crumb-active {
  color: var(--color-text-base-default);
  font-weight: var(--font-weight-fw-medium, 500);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Mode switch (center) */
.fob-mode-switch {
  display: flex; justify-self: center;
  background: var(--color-background-base-secondary);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-8, 8px);
  padding: 2px;
}
.fob-mode-btn {
  background: transparent; border: none;
  font-size: var(--font-size-fs-12, 12px);
  font-weight: var(--font-weight-fw-medium, 500);
  padding: 5px var(--spacing-14, 14px);
  border-radius: var(--border-radius-6, 6px);
  cursor: pointer;
  color: var(--color-text-base-secondary);
  display: flex; align-items: center; gap: var(--spacing-6);
  transition: color 0.12s, background 0.12s;
}
.fob-mode-btn:hover { color: var(--color-text-base-default); }
.fob-mode-btn.active-build { background: var(--color-text-base-default); color: var(--color-background-base-default); }
.fob-mode-btn.active-preview { background: var(--color-background-success-default, #166534); color: #fff; }
.fob-mode-btn.active-schema { background: #1E293B; color: #fff; }

/* Top-right actions */
.fob-topbar-right { display: flex; align-items: center; gap: var(--spacing-6); justify-self: end; }
.fob-save-status {
  font-size: var(--font-size-fs-11, 11px);
  color: var(--color-text-base-secondary);
  display: flex; align-items: center; gap: var(--spacing-5, 5px);
  margin-right: var(--spacing-4);
}
.fob-save-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-background-success-default, #166534);
}
.fob-btn {
  background: var(--color-background-base-default);
  border: var(--border-width-1) solid var(--color-border-base-default);
  padding: 5px var(--spacing-12);
  font-size: var(--font-size-fs-12, 12px);
  font-weight: var(--font-weight-fw-medium, 500);
  border-radius: var(--border-radius-4, 4px);
  cursor: pointer;
  color: var(--color-text-base-default);
  display: inline-flex; align-items: center; gap: var(--spacing-5, 5px);
  white-space: nowrap; transition: all 0.12s;
}
.fob-btn:hover { border-color: var(--color-border-base-tertiary); }
.fob-btn.primary {
  background: var(--color-background-brand-default, #0A69D9);
  color: #fff; border-color: transparent;
}
.fob-btn.primary:hover { opacity: 0.9; }
.fob-btn.ghost { background: transparent; border-color: transparent; }
.fob-btn.ghost:hover { background: var(--color-background-base-secondary); }
.fob-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--color-background-brand-default, #0A69D9);
  color: #fff; font-size: 10px; font-weight: var(--font-weight-fw-semibold, 600);
  display: grid; place-items: center;
}

/* ── Main 3-panel ── */
.fob-main {
  display: grid;
  grid-template-columns: 264px 1fr 320px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
.fob-main.mode-preview { grid-template-columns: 1fr; background: var(--color-background-base-secondary); }
.fob-main.mode-schema  { grid-template-columns: 1fr; background: #1E293B; }

/* ── Left panel ── */
.fob-panel-left {
  background: var(--color-background-base-default);
  border-right: var(--border-width-1) solid var(--color-border-base-default);
  overflow-y: auto; display: flex; flex-direction: column;
}
.fob-panel-hd {
  padding: var(--spacing-14, 14px) var(--spacing-16) var(--spacing-10, 10px);
  border-bottom: var(--border-width-1) solid var(--color-border-base-default);
  position: sticky; top: 0;
  background: var(--color-background-base-default); z-index: 1;
}
.fob-panel-title {
  font-size: var(--font-size-fs-11, 11px);
  font-weight: var(--font-weight-fw-semibold, 600);
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--color-text-base-secondary);
}
.fob-lib-tabs {
  display: flex; margin-top: var(--spacing-10, 10px); gap: 2px;
  background: var(--color-background-base-secondary);
  border-radius: var(--border-radius-6, 6px); padding: 2px;
}
.fob-lib-tab {
  flex: 1; background: transparent; border: none;
  padding: 5px var(--spacing-8);
  font-size: var(--font-size-fs-11, 11px);
  font-weight: var(--font-weight-fw-medium, 500);
  border-radius: var(--border-radius-4, 4px);
  cursor: pointer; color: var(--color-text-base-secondary);
  transition: all 0.12s;
}
.fob-lib-tab.active {
  background: var(--color-background-base-default);
  color: var(--color-text-base-default);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.fob-lib-search {
  margin-top: var(--spacing-10, 10px); position: relative;
}
.fob-lib-search input {
  width: 100%; padding: 6px var(--spacing-10, 10px) 6px 28px;
  font-size: var(--font-size-fs-12, 12px);
  background: var(--color-background-base-secondary);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-6, 6px); outline: none;
  color: var(--color-text-base-default);
}
.fob-lib-search input::placeholder { color: var(--color-text-base-tertiary); }
.fob-lib-search svg {
  position: absolute; left: 8px; top: 50%;
  transform: translateY(-50%); opacity: 0.4; pointer-events: none;
}
.fob-lib-body { padding: var(--spacing-10, 10px) var(--spacing-8) var(--spacing-20); flex: 1; }
.fob-lib-section { margin-bottom: var(--spacing-12); }
.fob-lib-section-label {
  font-size: 10px; font-weight: var(--font-weight-fw-semibold, 600);
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--color-text-base-tertiary);
  padding: 6px var(--spacing-8) 4px;
}
.fob-lib-item {
  display: flex; align-items: center; gap: var(--spacing-10, 10px);
  padding: var(--spacing-8) var(--spacing-10, 10px);
  border-radius: var(--border-radius-6, 6px);
  cursor: grab; transition: background 0.1s; user-select: none;
}
.fob-lib-item:hover { background: var(--color-background-base-secondary); }
.fob-lib-item:active { cursor: grabbing; }
.fob-lib-item-icon {
  width: 28px; height: 28px; border-radius: var(--border-radius-6, 6px);
  background: var(--color-background-base-secondary);
  display: grid; place-items: center; flex-shrink: 0;
  border: var(--border-width-1) solid var(--color-border-base-default);
}
.fob-lib-item-icon svg { width: 13px; height: 13px; stroke-width: 1.75; color: var(--color-icon-base-default); }
.fob-lib-item.pattern .fob-lib-item-icon {
  background: var(--color-background-brand-secondary, #EBF4FF);
  border-color: var(--color-border-brand-default, #0A69D9);
}
.fob-lib-item.pattern .fob-lib-item-icon svg { color: var(--color-icon-brand-default, #0A69D9); }
.fob-lib-item.branch-item .fob-lib-item-icon {
  background: var(--color-background-warning-secondary, #FEF3CD);
  border-color: var(--color-border-warning-default, #B45309);
}
.fob-lib-item.branch-item .fob-lib-item-icon svg { color: var(--color-icon-warning-default, #B45309); }
.fob-lib-item-body { flex: 1; min-width: 0; }
.fob-lib-item-name { font-size: var(--font-size-fs-12, 12px); font-weight: var(--font-weight-fw-medium, 500); }
.fob-lib-item-desc {
  font-size: 10px; color: var(--color-text-base-secondary); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fob-badge-int {
  font-size: 9px; font-weight: var(--font-weight-fw-semibold, 600);
  color: var(--color-text-brand-default, #0A69D9);
  background: var(--color-background-brand-secondary, #EBF4FF);
  padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
}
.fob-tip {
  margin: var(--spacing-16) var(--spacing-8) 0;
  padding: var(--spacing-12);
  border-radius: var(--border-radius-8, 8px);
  font-size: var(--font-size-fs-11, 11px);
  line-height: 1.5;
}
.fob-tip.brand { background: var(--color-background-brand-secondary, #EBF4FF); color: var(--color-text-brand-default, #0A69D9); }
.fob-tip.logic { background: #F3EEFD; color: #4C1D95; }
.fob-tip-title { font-weight: var(--font-weight-fw-semibold, 600); margin-bottom: 4px; }

/* ── Center canvas ── */
.fob-panel-center {
  background: var(--color-background-base-secondary);
  overflow: hidden; display: flex; flex-direction: column; position: relative;
}
.fob-canvas-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--spacing-10, 10px) var(--spacing-16);
  background: var(--color-background-base-default);
  border-bottom: var(--border-width-1) solid var(--color-border-base-default);
  gap: var(--spacing-12); flex-shrink: 0;
}
.fob-form-title-wrap { display: flex; align-items: baseline; gap: var(--spacing-8); min-width: 0; }
.fob-form-title {
  font-size: var(--font-size-fs-14, 14px);
  font-weight: var(--font-weight-fw-semibold, 600);
  color: var(--color-text-base-default);
  background: transparent; border: none; outline: none; padding: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;
}
.fob-form-title:focus { background: var(--color-background-base-secondary); border-radius: var(--border-radius-4, 4px); padding: 2px 6px; }
.fob-form-slug { font-size: var(--font-size-fs-11, 11px); color: var(--color-text-base-tertiary); white-space: nowrap; }
.fob-logic-btn {
  display: flex; align-items: center; gap: var(--spacing-6);
  background: transparent; border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-4, 4px);
  padding: 4px var(--spacing-10, 10px);
  font-size: var(--font-size-fs-11, 11px); font-weight: var(--font-weight-fw-medium, 500);
  cursor: pointer; color: var(--color-text-base-secondary);
  transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
}
.fob-logic-btn:hover { background: var(--color-background-base-secondary); color: var(--color-text-base-default); }
.fob-chip {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  font-weight: var(--font-weight-fw-semibold, 600);
}
.fob-chip.rules { background: #F3EEFD; color: #4C1D95; }
.fob-chip.branches { background: #FEF3CD; color: #B45309; }
.fob-chip.sources { background: var(--color-background-brand-secondary, #EBF4FF); color: var(--color-text-brand-default, #0A69D9); }

/* Steps rail */
.fob-steps-rail {
  display: flex; align-items: center; gap: var(--spacing-4);
  padding: var(--spacing-10, 10px) var(--spacing-16);
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
  border-bottom: var(--border-width-1) solid var(--color-border-base-default);
  background: var(--color-background-base-default);
}
.fob-steps-rail::-webkit-scrollbar { display: none; }
.fob-step-pill {
  display: flex; align-items: center; gap: var(--spacing-6);
  padding: var(--spacing-5, 5px) var(--spacing-10, 10px);
  border-radius: var(--border-radius-full);
  font-size: var(--font-size-fs-12, 12px); font-weight: var(--font-weight-fw-medium, 500);
  border: var(--border-width-1) solid var(--color-border-base-default);
  background: transparent; cursor: pointer;
  color: var(--color-text-base-secondary); white-space: nowrap;
  transition: all 0.12s;
}
.fob-step-pill:hover { background: var(--color-background-base-secondary); color: var(--color-text-base-default); }
.fob-step-pill.active {
  background: var(--color-background-brand-default, #0A69D9);
  border-color: transparent; color: #fff;
}
.fob-step-num {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: grid; place-items: center;
  font-size: 9px; font-weight: var(--font-weight-fw-bold, 700);
  flex-shrink: 0;
}
.fob-step-pill:not(.active) .fob-step-num {
  background: var(--color-background-base-secondary);
  color: var(--color-text-base-secondary);
}
.fob-step-lock { opacity: 0.6; margin-left: 2px; display: flex; align-items: center; }
.fob-step-add {
  width: 28px; height: 28px; border-radius: 50%;
  border: var(--border-width-1) dashed var(--color-border-base-default);
  background: transparent; cursor: pointer; display: grid; place-items: center;
  color: var(--color-text-base-tertiary); flex-shrink: 0;
  transition: all 0.12s;
}
.fob-step-add:hover { border-color: var(--color-border-brand-default); color: var(--color-icon-brand-default); background: var(--color-background-brand-secondary, #EBF4FF); }

/* Canvas scroll */
.fob-canvas-scroll { flex: 1; overflow-y: auto; padding: var(--spacing-24); }
.fob-canvas-doc { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--spacing-8); }

/* Step header */
.fob-step-header {
  background: var(--color-background-base-default);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-8, 8px);
  padding: var(--spacing-20) var(--spacing-24); margin-bottom: var(--spacing-4);
  display: flex; flex-direction: column; gap: var(--spacing-6);
}
.fob-step-tag {
  font-size: 10px; font-weight: var(--font-weight-fw-semibold, 600);
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--color-text-brand-default, #0A69D9);
}
.fob-step-title-input {
  font-size: var(--font-size-fs-20, 20px);
  font-weight: var(--font-weight-fw-semibold, 600);
  color: var(--color-text-base-default);
  background: transparent; border: none; outline: none; padding: 0; width: 100%;
}
.fob-step-title-input:disabled { cursor: default; }
.fob-step-title-input:focus { background: var(--color-background-base-secondary); border-radius: 4px; padding: 2px 6px; }
.fob-step-desc-input {
  font-size: var(--font-size-fs-14, 14px);
  color: var(--color-text-base-secondary); line-height: 1.5;
  background: transparent; border: none; outline: none;
  padding: 0; width: 100%; resize: none;
}
.fob-step-desc-input:disabled { cursor: default; }
.fob-step-lock-ribbon {
  display: inline-flex; align-items: center; gap: var(--spacing-6);
  font-size: var(--font-size-fs-11, 11px);
  color: var(--color-text-base-secondary);
  background: var(--color-background-base-secondary);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-4, 4px);
  padding: 3px var(--spacing-8); width: fit-content;
}

/* Field blocks */
.fob-field-block {
  background: var(--color-background-base-default);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: var(--border-radius-8, 8px);
  cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
}
.fob-field-block:hover { border-color: var(--color-border-base-tertiary); }
.fob-field-block.selected {
  border-color: var(--color-border-brand-default, #0A69D9);
  box-shadow: 0 0 0 3px var(--color-background-brand-secondary, #EBF4FF);
}
.fob-field-inner { padding: var(--spacing-14, 14px) var(--spacing-16); }
.fob-field-meta {
  display: flex; align-items: center; gap: var(--spacing-6); margin-bottom: var(--spacing-6);
}
.fob-field-label {
  font-size: var(--font-size-fs-12, 12px); font-weight: var(--font-weight-fw-semibold, 600);
  color: var(--color-text-base-default); flex: 1; min-width: 0;
}
.fob-field-required { color: #B91C1C; font-weight: var(--font-weight-fw-bold, 700); }
.fob-field-type-tag {
  font-size: 9px; font-weight: var(--font-weight-fw-semibold, 600);
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--color-text-base-tertiary);
  background: var(--color-background-base-secondary);
  border: var(--border-width-1) solid var(--color-border-base-default);
  border-radius: 3px; padding: 1px 4px; flex-shrink: 0;
}
.fob-field-type-tag.pattern { background: var(--color-background-brand-secondary, #EBF4FF); color: var(--color-text-brand-default, #0A69D9); border-color: var(--color-border-brand-default); }
.fob-field-int-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.fob-int-tag {
  font-size: 9px; font-weight: var(--font-weight-fw-semibold, 600);
  color: var(--color-text-brand-default, #0A69D9);
  background: var(--color-background-brand-secondary, #EBF4FF);
  border-radius: 3px; padding: 1px 5px;
}
.fob-field-preview {
  background: var(--color-background-base-secondary);
  border: var(--border-width-1) dashed var(--color-border-base-default);
  border-radius: var(--border-radius-4, 4px);
  padding: var(--spacing-10, 10px) var(--spacing-12);
  font-size: var(--font-size-fs-12, 12px);
  color: var(--color-text-base-tertiary);
  min-height: 36px; display: flex; align-items: center;
}
.fob-field-rules-strip {
  border-top: var(--border-width-1) solid var(--color-border-base-default);
  padding: 5px var(--spacing-16);
  display: flex; gap: var(--spacing-6); align-items: center; flex-wrap: wrap;
}
.fob-rule-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; padding: 1px 6px;
  border-radius: 3px; font-weight: var(--font-weight-fw-medium, 500);
}
.fob-rule-pill.show { background: #F3EEFD; color: #4C1D95; }
.fob-rule-pill.hide { background: #FEF0F0; color: #B91C1C; }
.fob-rule-pill.require { background: #FEF3CD; color: #B45309; }

/* Highlighted dep */
.fob-field-block.dep-highlight { border-color: var(--color-border-brand-default, #0A69D9); background: var(--color-background-brand-secondary, #EBF4FF); }

/* Branch block */
.fob-branch-block {
  border: var(--border-width-1) solid #B45309;
  border-radius: var(--border-radius-8, 8px);
  background: var(--color-background-base-default);
  overflow: hidden;
}
.fob-branch-block.selected { box-shadow: 0 0 0 3px #FEF3CD; }
.fob-branch-head {
  background: #FEF3CD;
  padding: var(--spacing-8) var(--spacing-16);
  display: flex; align-items: center; gap: var(--spacing-8);
  cursor: pointer;
}
.fob-branch-head-label { font-size: var(--font-size-fs-12, 12px); font-weight: var(--font-weight-fw-semibold, 600); color: #78350F; flex: 1; }
.fob-branch-tabs { display: flex; gap: 2px; padding: var(--spacing-8) var(--spacing-16); border-bottom: var(--border-width-1) solid var(--color-border-base-default); }
.fob-branch-tab {
  padding: 4px var(--spacing-10, 10px); border-radius: 3px;
  font-size: var(--font-size-fs-11, 11px); font-weight: var(--font-weight-fw-medium, 500);
  cursor: pointer; border: var(--border-width-1) solid transparent;
  color: var(--color-text-base-secondary); background: transparent; transition: all 0.1s;
}

/* ── Helpers ── */
function getAllFields(form) {
  const out = [];
  form.steps.forEach(s => {
    s.fields.forEach(f => {
      out.push({ ...f, _step: s.title, _stepId: s.id });
      if (f.branches) {
        Object.entries(f.branches).forEach(([val, branch]) => {
          branch.fields.forEach(bf => out.push({ ...bf, _step: s.title, _stepId: s.id, _branch: val, _branchId: branch.id }));
        });
      }
    });
  });
  return out;
}
function countLogic(form) {
  let rules = 0, branches = 0, sources = 0;
  getAllFields(form).forEach(f => {
    if (f.rules)    rules    += f.rules.length;
    if (f.branches) branches += 1;
    if (f.source)   sources  += 1;
  });
  return { rules, branches, sources };
}
function findField(form, id) { return getAllFields(form).find(f => f.id === id); }

/* ── LogicSheet ── */
function LogicSheet({ form, counts, onClose, onNavigate }) {
  const rules = [], branches = [], sources = [];
  form.steps.forEach((s, si) => {
    s.fields.forEach(f => {
      if (f.rules)    f.rules.forEach(r => rules.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, rule: r }));
      if (f.branches) branches.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, variants: Object.keys(f.branches) });
      if (f.source)   sources.push({ step: s.title, stepIdx: si, fieldId: f.id, fieldLabel: f.label, source: f.source });
    });
  });

  const Section = ({ title, count, color, items, renderItem }) => items.length === 0 ? null : h('div', null,
    h('div', { className: 'fob-logic-group-title' },
      h('span', null, title),
      h('span', { style: { color, fontFamily: 'ui-monospace,monospace' } }, count)
    ),
    items.map((item, i) => renderItem(item, i))
  );

  return h('div', { className: 'fob-logic-sheet' },
    h('div', { className: 'fob-logic-sheet-head' },
      h('div', { className: 'fob-logic-sheet-title' }, 'Prezentare generală logică'),

      h(Section, {
        title: 'Reguli câmp', count: counts.rules, color: '#7C3AED', items: rules,
        renderItem: (r, i) => h('div', { key: i, className: 'fob-logic-item', onClick: () => onNavigate(r.stepIdx, r.fieldId) },
          h('div', { className: 'fob-logic-item-head' },
            h('span', null, r.step),
            h('span', { style:{fontFamily:'ui-monospace,monospace',color:'#7C3AED'} }, r.fieldId)
          ),
          h('div', { className: 'fob-logic-item-rule' },
            h('span', { className: 'fob-rule-kw logic' }, r.rule.action), ' "', r.fieldLabel, '" când ',
            h('span', { className: 'fob-rule-ref' }, r.rule.when.field), ' ',
            h('span', { className: 'fob-rule-kw' }, r.rule.when.op), ' ',
            h('span', { className: 'fob-rule-val' }, `"${r.rule.when.value}"`)
          )
        )
      }),
      h(Section, {
        title: 'Ramuri', count: counts.branches, color: '#B45309', items: branches,
        renderItem: (b, i) => h('div', { key: i, className: 'fob-logic-item', onClick: () => onNavigate(b.stepIdx, b.fieldId) },
          h('div', { className: 'fob-logic-item-head' },
            h('span', null, b.step),
            h('span', { style:{fontFamily:'ui-monospace,monospace',color:'#B45309'} }, b.fieldId)
          ),
          h('div', { className: 'fob-logic-item-rule' },
            h('span', { className: 'fob-rule-kw branch' }, 'SWITCH'), ' "', b.fieldLabel, '" · ',
            b.variants.length, ' variante: ', b.variants.map(v=>`"${v}"`).join(' / ')
          )
        )
      }),
      h(Section, {
        title: 'Surse dependente', count: counts.sources, color: '#0A69D9', items: sources,
        renderItem: (s, i) => h('div', { key: i, className: 'fob-logic-item', onClick: () => onNavigate(s.stepIdx, s.fieldId) },
          h('div', { className: 'fob-logic-item-head' },
            h('span', null, s.step),
            h('span', { style:{fontFamily:'ui-monospace,monospace',color:'#0A69D9'} }, s.fieldId)

/* ── FieldBlock ── */

function FieldPreview({ field }) {
  const style = { className: 'fob-field-preview' };
  if (field.pattern) return h('div', style, `[${field.type.toUpperCase()} — ${(field.integrations||[]).join(', ')}]`);
  switch (field.type) {
    case 'text':
    case 'number': return h('div', style, 'Introduceți text…');
    case 'textarea': return h('div', { ...style, style:{minHeight:60} }, 'Text lung…');
    case 'date':   return h('div', style, 'ZZ/LL/AAAA');
    case 'select': return h('div', style, 'Selectați o opțiune ▾');
    case 'radio':  return h('div', { className: 'fob-field-preview', style:{flexDirection:'column',gap:4} },
      (field.options||['Opțiunea 1','Opțiunea 2']).slice(0,2).map((o,i) =>
        h('div', { key: i, style:{display:'flex',alignItems:'center',gap:6} },
          h('span', { style:{width:12,height:12,borderRadius:'50%',border:'1.5px solid var(--color-border-base-default)',flexShrink:0} }),
          o
        )
      )
    );
    case 'upload':  return h('div', style, '📎 Încărcați fișier…');
    case 'divider': return h('hr', { style:{border:'none',borderTop:'1px dashed var(--color-border-base-default)',margin:0} });
    default: return h('div', style, field.type);
  }
}

/* ── RightPanel ── */
function RightPanel({ field, form, setForm, prTab, setPrTab, setHighlightedDep }) {
  if (!field) return h('div', { className: 'fob-panel-right' },
    h('div', { className: 'fob-pr-empty' },
      h(Icon, { name: 'info', size: 24 }),
      h('span', null, 'Selectați un câmp pentru a-l edita')
    )
  );

  const updateField = (patch) => {
    setForm(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      getAllFields(next).forEach(f => { if (f.id === field.id) Object.assign(f, patch); });
      return next;
    });
  };

  const tabs = [
    { key: 'basic',   label: 'General' },
    { key: 'logic',   label: 'Logică' },
    { key: 'advanced',label: 'Avansat' },
  ];

  return h('div', { className: 'fob-panel-right' },
    h('div', { className: 'fob-pr-tabs' },
      tabs.map(t => h('button', {
        key: t.key, type: 'button',
        className: `fob-pr-tab${prTab===t.key?' active':''}`,
        onClick: () => setPrTab(t.key)
      }, t.label))
    ),
    h('div', { className: 'fob-pr-body' },
      prTab === 'basic'    && h(BasicTab,    { field, updateField }),
      prTab === 'logic'    && h(LogicTab,    { field, form, updateField, setHighlightedDep }),
      prTab === 'advanced' && h(AdvancedTab, { field, updateField })
    )
  );
}

      ),
      h('div', { className: 'fob-pr-toggle' },
        h('span', { className: 'fob-pr-toggle-label' }, 'Câmp obligatoriu'),
        h('input', { type: 'checkbox', checked: !!field.required, onChange: e => updateField({ required: e.target.checked }) })
      )
    ),
    field.help !== undefined && h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, 'Text ajutor'),
      h('div', { className: 'fob-pr-row' },
        h('textarea', { className: 'fob-pr-input fob-pr-textarea', defaultValue: field.help || '', placeholder: 'Text auxiliar sub câmp…', onBlur: e => updateField({ help: e.target.value }) })
      )
    ),
    (field.type === 'select' || field.type === 'radio' || field.type === 'checkbox') && h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, 'Opțiuni'),
      field.source
        ? h('div', { className: 'fob-pr-source-box' },
            'Sursă dinamică: ', h('strong', null, field.source.type),
            field.source.filter && h('div', { style:{marginTop:4,opacity:0.8} }, `Filtru: ${field.source.filter}`)
          )
        : h('div', { className: 'fob-pr-options' },
            (field.options || []).map((opt, i) =>
              h('div', { key: i, className: 'fob-pr-option' },
                h('span', null, opt),
                h('button', { type: 'button', className: 'fob-pr-option-del', onClick: () => {
                  const opts = [...(field.options||[])]; opts.splice(i, 1); updateField({ options: opts });
                }}, '×')
              )
            ),
            h('button', { type: 'button', className: 'fob-pr-add-opt', onClick: () => {
              const opts = [...(field.options||[]), `Opțiunea ${(field.options||[]).length + 1}`]; updateField({ options: opts });
            }}, '+ Adaugă opțiune')
          )
    ),
    field.integrations && h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, 'Integrări'),
      h('div', { className: 'fob-pr-integration-list' },
        field.integrations.map(i => h('div', { key: i, className: 'fob-pr-int-item' }, h(Icon, { name: 'link', size: 12 }), i))
      )
    )
  );
}

function LogicTab({ field, form, updateField, setHighlightedDep }) {
  const allFields = getAllFields(form).filter(f => f.id !== field.id);
  const rules = field.rules || [];

  return h(React.Fragment, null,
    h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, `Reguli de afișare (${rules.length})`),
      rules.length === 0
        ? h('div', { style:{fontSize:12,color:'var(--color-text-base-tertiary)',padding:'8px 0'} }, 'Nicio regulă. Câmpul este întotdeauna vizibil.')
        : h('div', { className: 'fob-pr-rules' },
            rules.map((r, i) => h('div', { key: i, className: 'fob-pr-rule',
              onMouseEnter: () => setHighlightedDep(r.when?.field),
              onMouseLeave: () => setHighlightedDep(null)
            },
              h('span', { className: 'fob-pr-rule-action' }, r.action), ' câmpul ',
              h('strong', null, `"${field.label}"`), ' când ',
              h('code', { style:{background:'#EDE9FE',padding:'1px 4px',borderRadius:3,fontSize:11} }, r.when?.field),
              ' ', h('em', null, r.when?.op), ' ',
              h('code', { style:{background:'#D1FAE5',padding:'1px 4px',borderRadius:3,fontSize:11} }, `"${r.when?.value}"`)
            ))
          )
    )
  );
}

function AdvancedTab({ field, updateField }) {
  return h(React.Fragment, null,
    h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, 'Validare'),
      field.validation
        ? h('div', { style:{fontSize:12,color:'var(--color-text-base-secondary)'} }, field.validation.join(', '))
        : h('div', { style:{fontSize:12,color:'var(--color-text-base-tertiary)'} }, 'Nicio validare personalizată.')
    ),
    h('div', { className: 'fob-pr-section' },
      h('div', { className: 'fob-pr-section-title' }, 'Metadate'),
      h('div', { className: 'fob-pr-row' },
        h('label', { className: 'fob-pr-label' }, 'Pas'),
        h('input', { className: 'fob-pr-input', value: field._step || '—', readOnly: true, style:{opacity:0.6} })
      ),
      field._branch && h('div', { className: 'fob-pr-row' },
        h('label', { className: 'fob-pr-label' }, 'Ramură'),
        h('input', { className: 'fob-pr-input', value: field._branch, readOnly: true, style:{opacity:0.6} })
      )
    )
  );
}

/* ── PreviewStage ── */
function PreviewStage({ form }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [values, setValues]   = useState({});
  const step = form.steps[stepIdx];
  const setValue = (id, v) => setValues(p => ({ ...p, [id]: v }));

  const shouldShow = (f) => {
    if (!f.rules || f.rules.length === 0) return true;
    return f.rules.every(r => {
      if (r.action !== 'SHOW') return true;
      const cond = r.when;
      if (!cond) return true;
      return values[cond.field] === cond.value;
    });
  };

  return h('div', { className: 'fob-preview-stage' },
    h('div', { className: 'fob-preview-form' },
      h('div', { className: 'fob-preview-step-ind' }, `Pasul ${stepIdx + 1} din ${form.steps.length}`),
      h('div', { className: 'fob-preview-title' }, step.title),
      step.description && h('div', { className: 'fob-preview-desc' }, step.description),
      step.fields.filter(shouldShow).map(f =>
        h('div', { key: f.id, className: 'fob-preview-field' },
          h('label', { className: 'fob-preview-label' },
            f.label,
            f.required && h('span', { style:{color:'#B91C1C'} }, ' *')
          ),
          h(PreviewControl, { field: f, values, setValue: (v) => setValue(f.id, v) }),
          f.help && h('div', { className: 'fob-preview-help' }, f.help)
        )
      ),
      h('div', { className: 'fob-preview-nav' },
        stepIdx > 0 && h('button', { className: 'fob-btn', onClick: () => setStepIdx(i => i - 1) }, '← Înapoi'),
        stepIdx < form.steps.length - 1
          ? h('button', { className: 'fob-btn primary', onClick: () => setStepIdx(i => i + 1) }, 'Continuă →')
          : h('button', { className: 'fob-btn primary' }, 'Trimite')
      )
    )
  );
}

function PreviewControl({ field, values, setValue }) {
  if (field.pattern) return h('div', {
    style:{padding:'16px',border:'1px dashed var(--color-border-base-default)',borderRadius:8,textAlign:'center',color:'var(--color-text-base-tertiary)',fontSize:12}
  }, `[${field.type.toUpperCase()} — ${(field.integrations||[]).join(', ')}]`);

  switch (field.type) {
    case 'text':
    case 'number': return h('input', { className: 'fob-preview-input', type: field.type === 'number' ? 'number' : 'text', placeholder: field.label, value: values[field.id] || '', onChange: e => setValue(e.target.value) });
    case 'textarea': return h('textarea', { className: 'fob-preview-textarea', rows: 3, placeholder: field.label });
    case 'date':   return h('input', { className: 'fob-preview-input', type: 'date' });
    case 'select': return h('select', { className: 'fob-preview-select', value: values[field.id] || '', onChange: e => setValue(e.target.value) },
      h('option', { value: '' }, 'Selectează…'),
      (field.options || []).map(o => h('option', { key: o, value: o }, o))
    );
    case 'radio':  return h('div', null,
      (field.options || []).map(o => h('div', {
        key: o,
        className: `fob-preview-option${values[field.id] === o ? ' selected' : ''}`,
        onClick: () => setValue(o)
      }, h('div', { className: 'fob-preview-radio' }), o))
    );
    case 'upload': return h('div', {
      style:{padding:'20px',border:'1px dashed var(--color-border-base-default)',borderRadius:8,textAlign:'center',color:'var(--color-text-base-tertiary)',fontSize:13}
    }, 'Trageți fișierul sau faceți clic pentru a naviga');
    default: return h('input', { className: 'fob-preview-input', placeholder: field.type });
  }
}

/* ── SchemaStage ── */
function SchemaStage({ form }) {
  const json = useMemo(() => JSON.stringify(form, null, 2), [form]);
  const highlighted = useMemo(() => highlightJSON(json), [json]);
  const lines = json.split('\n');
  return h('div', { className: 'fob-schema-stage' },
    h('div', { className: 'fob-schema-toolbar' },
      h('span', { className: 'fob-schema-file' }, `forms/${form.slug}.json`)
    ),
    h('div', { className: 'fob-schema-body' },
      h('div', { className: 'fob-schema-inner' },
        h('div', { className: 'fob-schema-gutter' }, lines.map((_, i) => h('div', { key: i }, i + 1))),
        h('div', { className: 'fob-schema-code', dangerouslySetInnerHTML: { __html: highlighted } })
      )
    )
  );
}

function highlightJSON(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let cls = 'fob-tok-num';
      if (/^"/.test(m)) cls = /:$/.test(m) ? 'fob-tok-key' : 'fob-tok-str';
      else if (/true|false/.test(m)) cls = 'fob-tok-bool';
      return `<span class="${cls}">${m}</span>`;
    })
    .replace(/([{}\[\],])/g, '<span class="fob-tok-brace">$1</span>');
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
